    --sol-element-primary: #ffffff;
    --sol-element-secondary: rgba(255, 255, 255, 0.8);
    --sol-element-tertiary: rgba(255, 255, 255, 0.6);
    --sol-element-quaternary: rgba(255, 255, 255, 0.5);
    --sol-border-brand: #7b74c4;
    --sol-border-normal-variant: rgba(255, 255, 255, 0.08);
    --sol-border-solid-variant: #3d3d3d;
    --sol-border-solid: #333333;
    --sol-error: #ee7a80;
    --sol-error-container: rgba(231, 96, 103, 0.24);
    --sol-static-white: #ffffff;
    --sol-static-black: #000000;
  }
}
</style>
